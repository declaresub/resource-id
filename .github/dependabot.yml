version: 2
updates:
  # Keep the SHA-pinned actions in .github/workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait a few days after a release before proposing it, so a compromised
    # just-published version has time to be detected and yanked first.
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  # Python dependencies (pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      python:
        patterns:
          - "*"
