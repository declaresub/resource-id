name: zizmor GitHub Actions audit

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions: {}

jobs:
  zizmor:
    name: Audit workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      # Fails the build on any finding, so workflow-security regressions are
      # caught in review rather than landing silently.
      - name: Run zizmor
        run: uvx zizmor@1.24.1 .github/workflows/
        env:
          GH_TOKEN: ${{ github.token }}
